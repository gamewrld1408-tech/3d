<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIIT Timer | 50 Rounds</title>
    <style>
        :root {
            --work-color: #ef4444; /* Red */
            --rest-color: #3b82f6; /* Blue */
            --bg: #0f172a;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .timer-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
        }
        #status {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 800;
        }
        #time-display {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }
        #round-display {
            font-size: 1.2rem;
            opacity: 0.7;
        }
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .start-btn { background-color: #22c55e; color: white; }
        .reset-btn { background-color: #64748b; color: white; }
        
        /* Dynamic Classes */
        .work-mode { color: var(--work-color); }
        .rest-mode { color: var(--rest-color); }
    </style>
</head>
<body>

    <div class="timer-card">
        <div id="round-display">ROUND 1 / 50</div>
        <div id="status">READY?</div>
        <div id="time-display">00</div>
        
        <div class="controls">
            <button id="mainBtn" class="start-btn" onclick="toggleTimer()">START WORKOUT</button>
            <button class="reset-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <script>
        let rounds = 50;
        let workTime = 45;
        let restTime = 15;
        
        let currentRound = 1;
        let timeLeft = workTime;
        let isWork = true;
        let timer = null;
        let isActive = false;

        const timeDisplay = document.getElementById('time-display');
        const statusDisplay = document.getElementById('status');
        const roundDisplay = document.getElementById('round-display');
        const mainBtn = document.getElementById('mainBtn');

        // Audio Context for beeps
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq = 440, duration = 0.2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function updateUI() {
            timeDisplay.innerText = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
            roundDisplay.innerText = `ROUND ${currentRound} / ${rounds}`;
            
            if (isWork) {
                statusDisplay.innerText = "WORK";
                timeDisplay.className = "work-mode";
            } else {
                statusDisplay.innerText = "REST";
                timeDisplay.className = "rest-mode";
            }
        }

        function toggleTimer() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (isActive) {
                clearInterval(timer);
                mainBtn.innerText = "RESUME";
                mainBtn.style.backgroundColor = "#22c55e";
            } else {
                timer = setInterval(countDown, 1000);
                mainBtn.innerText = "PAUSE";
                mainBtn.style.backgroundColor = "#eab308";
            }
            isActive = !isActive;
        }

        function countDown() {
            if (timeLeft > 0) {
                timeLeft--;
                if (timeLeft <= 3 && timeLeft > 0) beep(440, 0.1); // Short warning beeps
                if (timeLeft === 0) beep(880, 0.5); // End of period beep
            } else {
                if (isWork) {
                    isWork = false;
                    timeLeft = restTime;
                } else {
                    isWork = true;
                    timeLeft = workTime;
                    currentRound++;
                }

                if (currentRound > rounds) {
                    clearInterval(timer);
                    alert("WORKOUT COMPLETE!");
                    resetTimer();
                    return;
                }
            }
            updateUI();
        }

        function resetTimer() {
            clearInterval(timer);
            isActive = false;
            currentRound = 1;
            timeLeft = workTime;
            isWork = true;
            mainBtn.innerText = "START WORKOUT";
            mainBtn.style.backgroundColor = "#22c55e";
            updateUI();
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
