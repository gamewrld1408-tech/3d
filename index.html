<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Fitness Trainer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --ios-bg: #1c1c1e; --ios-border: #38383a; 
            --fitness-green: #34c759; --text-main: #ffffff; --text-grey: #8e8e93;
        }
        body { 
            font-family: -apple-system, sans-serif; background: var(--ios-bg); 
            margin: 0; color: var(--text-main); display: flex; flex-direction: column; height: 100dvh; 
        }
        .header { 
            padding: 50px 20px 10px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 0.5px solid var(--ios-border); background: var(--ios-bg);
        }
        .header h1 { margin: 0; font-size: 20px; font-weight: 700; }
        .workout-container { flex-grow: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .character-view { 
            flex: 1.5; display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #2a2a2e 0%, #000 100%);
        }
        .control-panel { 
            flex: 1; background: rgba(28,28,30,0.95); padding: 20px 20px 60px 20px; 
            display: flex; flex-direction: column; gap: 20px; border-top: 0.5px solid var(--ios-border);
        }
        .exec-info h2 { font-size: 24px; color: var(--fitness-green); margin: 0;}
        .timer { font-size: 60px; font-weight: 200; color: var(--text-main); margin: 10px 0;}
        .player-controls { display: flex; justify-content: space-around; align-items: center; margin-top: auto;}
        .ctrl-btn { font-size: 28px; color: var(--text-grey); background: none; border: none; cursor: pointer;}
        .play-btn { font-size: 50px; color: var(--fitness-green); }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="progressTitle">HIIT - 1/2</h1>
    </div>

    <div class="workout-container">
        <div class="character-view">
            <model-viewer id="workout-model" src="bodyblock.glb" camera-controls autoplay loop shadow-intensity="1" style="width: 100%; height: 100%;"></model-viewer>
        </div>

        <div class="control-panel">
            <div class="exec-info">
                <h2 id="execName">Body Block</h2>
                <p id="execDesc">Keep your core tight!</p>
            </div>
            <div class="timer" id="timeDisplay">00:45</div>
            <div class="player-controls">
                <button class="ctrl-btn" id="prevBtn">❮</button>
                <button class="ctrl-btn play-btn" id="playBtn">►</button>
                <button class="ctrl-btn" id="nextBtn">❯</button>
            </div>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "Body Block", desc: "Keep your core tight.", file: "bodyblock.glb", seconds: 45 },
            { title: "Jumping Jacks", desc: "Full body cardio!", file: "jumpingJack.glb", seconds: 60 }
        ];

        let currentIndex = 0;
        let timeLeft = playlist[0].seconds;
        let timerId = null;
        let isPlaying = false;

        const modelViewer = document.getElementById('workout-model');
        const timeDisplay = document.getElementById('timeDisplay');
        const playBtn = document.getElementById('playBtn');

        function formatTime(s) {
            const mins = Math.floor(s / 60);
            const secs = s % 60;
            return `0${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function updateUI() {
            const w = playlist[currentIndex];
            modelViewer.src = w.file;
            document.getElementById('execName').textContent = w.title;
            document.getElementById('execDesc').textContent = w.desc;
            document.getElementById('progressTitle').textContent = `HIIT - ${currentIndex + 1}/${playlist.length}`;
            if(!isPlaying) {
                timeLeft = w.seconds;
                timeDisplay.textContent = formatTime(timeLeft);
            }
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                clearInterval(timerId);
                playBtn.textContent = '►';
            } else {
                playBtn.textContent = '⏸';
                timerId = setInterval(() => {
                    timeLeft--;
                    timeDisplay.textContent = formatTime(timeLeft);
                    if (timeLeft <= 0) clearInterval(timerId);
                }, 1000);
            }
            isPlaying = !isPlaying;
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % playlist.length;
            isPlaying = false;
            clearInterval(timerId);
            playBtn.textContent = '►';
            updateUI();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            isPlaying = false;
            clearInterval(timerId);
            playBtn.textContent = '►';
            updateUI();
        });
    </script>
</body>
</html>
