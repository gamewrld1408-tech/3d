<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIIT Timer | Audio Pulse</title>
    <style>
        :root { --work: #ef4444; --rest: #3b82f6; --bg: #0f172a; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .timer-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 400px;
        }
        #time-display { font-size: 9rem; font-weight: 900; margin: 10px 0; font-variant-numeric: tabular-nums; transition: 0.3s; }
        #status { font-size: 1.5rem; font-weight: 800; letter-spacing: 4px; margin-bottom: 5px; }
        .work-text { color: var(--work); text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .rest-text { color: var(--rest); text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        
        .btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .start-btn { background: #22c55e; color: white; }
        .music-indicator { font-size: 12px; margin-top: 15px; opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bar { width: 3px; height: 10px; background: white; animation: bounce 0.5s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { height: 5px; } 50% { height: 15px; } }
    </style>
</head>
<body>

    <div class="timer-card">
        <div id="round-info" style="opacity: 0.5; font-weight: 600;">ROUND 1 / 50</div>
        <div id="status">READY</div>
        <div id="time-display">45</div>
        
        <button id="mainBtn" class="btn start-btn" onclick="startWorkout()">START WORKOUT</button>
        
        <div class="music-indicator" id="musicStatus" style="visibility: hidden;">
            <div class="bar"></div><div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.2s"></div>
            ELECTRONIC BEATS ACTIVE
        </div>
    </div>

    <audio id="workoutMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let workTime = 45;
        let restTime = 15;
        let totalRounds = 50;
        
        let currentRound = 1;
        let timeLeft = workTime;
        let isWork = true;
        let timer = null;
        const music = document.getElementById('workoutMusic');

        function startWorkout() {
            if (timer) return; // Prevent double start
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('musicStatus').style.visibility = 'visible';
            music.play();
            timer = setInterval(runTimer, 1000);
            updateDisplay();
        }

        function runTimer() {
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                // Switch modes
                if (isWork) {
                    isWork = false;
                    timeLeft = restTime;
                    music.pause(); // Stop music during break
                    document.getElementById('musicStatus').style.opacity = '0.2';
                } else {
                    isWork = true;
                    timeLeft = workTime;
                    currentRound++;
                    music.play(); // Start music for work
                    document.getElementById('musicStatus').style.opacity = '1';
                }

                if (currentRound > totalRounds) {
                    clearInterval(timer);
                    alert("Workout Finished!");
                    location.reload();
                }
            }
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('time-display');
            const status = document.getElementById('status');
            display.innerText = timeLeft;
            document.getElementById('round-info').innerText = `ROUND ${currentRound} / ${totalRounds}`;
            
            if (isWork) {
                status.innerText = "WORK";
                display.className = "work-text";
            } else {
                status.innerText = "REST";
                display.className = "rest-text";
            }
        }
    </script>
</body>
</html>
